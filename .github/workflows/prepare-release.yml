name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version-bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    name: Prepare Release PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract current version
        id: current
        run: |
          CURRENT_VERSION=$(grep '<revision>' pom.xml | sed 's/.*<revision>\(.*\)<\/revision>.*/\1/')
          echo "VERSION=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: new
        run: |
          CURRENT="${{ steps.current.outputs.VERSION }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          case "${{ inputs.version-bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "VERSION=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Check if version already exists
        run: |
          NEW_VERSION="${{ steps.new.outputs.VERSION }}"
          if git rev-parse "v${NEW_VERSION}" >/dev/null 2>&1; then
            echo "❌ ERROR: Tag v${NEW_VERSION} already exists!"
            echo "Please choose a different version bump or delete the existing tag."
            exit 1
          fi
          echo "✅ Version v${NEW_VERSION} is available"

      - name: Update pom.xml version
        run: |
          NEW_VERSION="${{ steps.new.outputs.VERSION }}"
          sed -i.bak "s|<revision>.*</revision>|<revision>${NEW_VERSION}</revision>|" pom.xml
          rm pom.xml.bak
          echo "Updated pom.xml to version ${NEW_VERSION}"

      - name: Create release branch
        run: |
          NEW_VERSION="${{ steps.new.outputs.VERSION }}"
          BRANCH="release/${NEW_VERSION}"
          
          # Delete branch if it exists (from failed previous run)
          git push origin --delete "$BRANCH" 2>/dev/null || true
          
          git checkout -b "$BRANCH"
          git add pom.xml
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.new.outputs.VERSION }}"
          BRANCH="release/${NEW_VERSION}"
          
          cat > pr_body.md <<'EOF'
          ## Release ${NEW_VERSION}

          This PR prepares the release for version **${NEW_VERSION}**.

          ### Changes
          <!-- Please describe the changes included in this release -->
          - 
          - 

          ### Breaking Changes
          <!-- List any breaking changes, or write "None" -->
          - 

          ### Checklist
          - [ ] Version number is correct
          - [ ] CHANGELOG is updated (if applicable)
          - [ ] All tests pass
          - [ ] Documentation is updated (if needed)
          
          EOF
          
          # Replace placeholder
          sed -i "s/\${NEW_VERSION}/${NEW_VERSION}/g" pr_body.md
          
          gh pr create \
            --title "Release ${NEW_VERSION}" \
            --body-file pr_body.md \
            --base main \
            --head "$BRANCH" 
          
          echo "✅ Release PR created for version ${NEW_VERSION}"
