# Continuous Delivery - releases to Jenkins Update Center
# Note: additional setup required, see https://www.jenkins.io/redirect/continuous-delivery-of-plugins
name: cd

on:
  workflow_dispatch:
  check_run:
    types:
      - completed

jobs:
  maven-cd:
    uses: jenkins-infra/github-reusable-workflows/.github/workflows/maven-cd.yml@v1
    secrets:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_TOKEN: ${{ secrets.MAVEN_TOKEN }}
