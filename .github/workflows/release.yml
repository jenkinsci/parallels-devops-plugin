name: Release

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build, Test, Package & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17 (Temurin) with Maven cache
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build, test, run static analysis, and package
        run: mvn --batch-mode clean verify

      - name: Extract actual version from Maven build
        id: version
        run: |
          # Read version from pom.properties generated by Maven (source of truth)
          VERSION=$(grep '^version=' target/maven-archiver/pom.properties | cut -d'=' -f2)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Built version: $VERSION"

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: target/surefire-reports/*.xml
          if-no-files-found: ignore

      - name: Upload Checkstyle report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: checkstyle-report
          path: target/checkstyle-result.xml
          if-no-files-found: ignore

      - name: Upload .hpi plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: parallels-devops-${{ steps.version.outputs.VERSION }}
          path: target/*.hpi
          if-no-files-found: error

      - name: Rename .hpi file for release
        run: |
          cp target/parallels-devops.hpi target/parallels-devops-${{ steps.version.outputs.VERSION }}.hpi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          files: target/parallels-devops-${{ steps.version.outputs.VERSION }}.hpi
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
