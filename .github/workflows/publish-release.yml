name: Upload HPI to GitHub Release

on:
  workflow_run:
    workflows: ["cd"]
    types: [completed]
    branches:
      - main

jobs:
  upload-hpi:
    name: Upload HPI to GitHub Release
    # Only run if CD workflow succeeded
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(grep '<revision>' pom.xml | sed 's/.*<revision>\(.*\)<\/revision>.*/\1/')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build plugin with release version
        run: |
          mvn clean package -DskipTests -Dchangelist=
          echo "Build complete"

      - name: Verify and prepare HPI file
        id: hpi
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          HPI_FILE="target/parallels-devops.hpi"
          
          if [ ! -f "$HPI_FILE" ]; then
            echo "❌ HPI file not found at $HPI_FILE"
            exit 1
          fi
          
          # Get actual version from pom.properties
          ACTUAL_VERSION=$(grep '^version=' target/maven-archiver/pom.properties | cut -d'=' -f2)
          ACTUAL_VERSION="${ACTUAL_VERSION%.}"  # Strip trailing dot if present
          echo "Built version: $ACTUAL_VERSION"
          echo "Expected version: $VERSION"
          
          if [ "$ACTUAL_VERSION" != "$VERSION" ]; then
            echo "❌ Version mismatch! Expected $VERSION but got $ACTUAL_VERSION"
            exit 1
          fi
          
          # Copy to versioned filename
          cp "$HPI_FILE" "target/parallels-devops-${VERSION}.hpi"
          echo "HPI_PATH=target/parallels-devops-${VERSION}.hpi" >> "$GITHUB_OUTPUT"
          echo "✅ HPI file ready: parallels-devops-${VERSION}.hpi"

      - name: Find release created by CD workflow
        id: release
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          
          echo "Looking for release with version prefix ${VERSION}..."
          
          # CD workflow creates tags like: 0.1.69.XX.vGITHASH
          # Find the most recent one matching our version
          RELEASE_TAG=$(gh release list --limit 20 | grep "^${VERSION}\." | head -1 | awk '{print $1}')
          
          if [ -z "$RELEASE_TAG" ]; then
            echo "❌ Release with version ${VERSION} not found"
            echo "Available releases:"
            gh release list --limit 10
            exit 1
          fi
          
          echo "✅ Found release: ${RELEASE_TAG}"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload HPI to existing release
        run: |
          RELEASE_TAG="${{ steps.release.outputs.RELEASE_TAG }}"
          HPI_PATH="${{ steps.hpi.outputs.HPI_PATH }}"
          
          echo "Uploading ${HPI_PATH} to release ${RELEASE_TAG}..."
          gh release upload "$RELEASE_TAG" "$HPI_PATH" --clobber
          
          echo "✅ HPI file uploaded to GitHub release ${RELEASE_TAG}"
        env:
          GH_TOKEN: ${{ github.token }}
