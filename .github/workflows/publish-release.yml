name: Upload HPI to GitHub Release

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  upload-hpi:
    name: Upload HPI to GitHub Release
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH_NAME#release/}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build plugin with release version
        run: |
          mvn clean package -DskipTests -Dchangelist=
          echo "Build complete"

      - name: Verify and prepare HPI file
        id: hpi
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          HPI_FILE="target/parallels-devops.hpi"
          
          if [ ! -f "$HPI_FILE" ]; then
            echo "❌ HPI file not found at $HPI_FILE"
            exit 1
          fi
          
          # Get actual version from pom.properties
          ACTUAL_VERSION=$(grep '^version=' target/maven-archiver/pom.properties | cut -d'=' -f2)
          ACTUAL_VERSION="${ACTUAL_VERSION%.}"  # Strip trailing dot if present
          echo "Built version: $ACTUAL_VERSION"
          echo "Expected version: $VERSION"
          
          if [ "$ACTUAL_VERSION" != "$VERSION" ]; then
            echo "❌ Version mismatch! Expected $VERSION but got $ACTUAL_VERSION"
            exit 1
          fi
          
          # Copy to versioned filename
          cp "$HPI_FILE" "target/parallels-devops-${VERSION}.hpi"
          echo "HPI_PATH=target/parallels-devops-${VERSION}.hpi" >> "$GITHUB_OUTPUT"
          echo "✅ HPI file ready: parallels-devops-${VERSION}.hpi"

      - name: Wait for CD workflow to create release
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="v${VERSION}"
          
          echo "Waiting for CD workflow to create release ${TAG}..."
          
          # Wait up to 30 minutes for the release to be created (CD workflow runs full Maven build + deployment)
          for i in {1..180}; do
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "✅ Release ${TAG} found!"
              exit 0
            fi
            echo "⏳ Waiting for release... (attempt $i/180)"
            sleep 10
          done
          
          echo "❌ Release ${TAG} not found after 30 minutes"
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload HPI to existing release
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="v${VERSION}"
          HPI_PATH="${{ steps.hpi.outputs.HPI_PATH }}"
          
          echo "Uploading ${HPI_PATH} to release ${TAG}..."
          gh release upload "$TAG" "$HPI_PATH" --clobber
          
          echo "✅ HPI file uploaded to GitHub release ${TAG}"
        env:
          GH_TOKEN: ${{ github.token }}
