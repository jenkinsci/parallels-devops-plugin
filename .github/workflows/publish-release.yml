name: Upload HPI to GitHub Release

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  upload-hpi:
    name: Upload HPI to GitHub Release
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH_NAME#release/}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build plugin with release version
        run: |
          mvn clean package -DskipTests -Dchangelist=
          echo "Build complete"

      - name: Verify and prepare HPI file
        id: hpi
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          HPI_FILE="target/parallels-devops.hpi"
          
          if [ ! -f "$HPI_FILE" ]; then
            echo "❌ HPI file not found at $HPI_FILE"
            exit 1
          fi
          
          # Get actual version from pom.properties
          ACTUAL_VERSION=$(grep '^version=' target/maven-archiver/pom.properties | cut -d'=' -f2)
          ACTUAL_VERSION="${ACTUAL_VERSION%.}"  # Strip trailing dot if present
          echo "Built version: $ACTUAL_VERSION"
          echo "Expected version: $VERSION"
          
          if [ "$ACTUAL_VERSION" != "$VERSION" ]; then
            echo "❌ Version mismatch! Expected $VERSION but got $ACTUAL_VERSION"
            exit 1
          fi
          
          # Copy to versioned filename
          cp "$HPI_FILE" "target/parallels-devops-${VERSION}.hpi"
          echo "HPI_PATH=target/parallels-devops-${VERSION}.hpi" >> "$GITHUB_OUTPUT"
          echo "✅ HPI file ready: parallels-devops-${VERSION}.hpi"

      - name: Wait for CD workflow to create release
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          COMMIT_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          
          echo "Waiting for CD workflow to create release for commit ${SHORT_SHA}..."
          echo "Expected version prefix: ${VERSION}"
          
          # Wait up to 30 minutes for the release to be created (CD workflow uses incremental versioning)
          for i in {1..180}; do
            # Find tag created by CD workflow (format: 0.1.66.XX.vGITHASH)
            RELEASE_TAG=$(gh release list --limit 20 | grep "^${VERSION}\." | head -1 | awk '{print $1}')
            
            if [ -n "$RELEASE_TAG" ]; then
              echo "✅ Release ${RELEASE_TAG} found!"
              echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "⏳ Waiting for release... (attempt $i/180)"
            sleep 10
          done
          
          echo "❌ Release with version ${VERSION} not found after 30 minutes"
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload HPI to existing release
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          RELEASE_TAG=$(gh release list --limit 20 | grep "^${VERSION}\." | head -1 | awk '{print $1}')
          HPI_PATH="${{ steps.hpi.outputs.HPI_PATH }}"
          
          if [ -z "$RELEASE_TAG" ]; then
            echo "❌ Could not find release tag"
            exit 1
          fi
          
          echo "Uploading ${HPI_PATH} to release ${RELEASE_TAG}..."
          gh release upload "$RELEASE_TAG" "$HPI_PATH" --clobber
          
          echo "✅ HPI file uploaded to GitHub release ${RELEASE_TAG}"
        env:
          GH_TOKEN: ${{ github.token }}
